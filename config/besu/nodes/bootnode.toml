# Bootnode Configuration - Network Discovery Only
# No RPC, no consensus participation; P2P discovery only.

# Network
p2p-host="0.0.0.0"
p2p-port=30303
max-peers=25

# Metrics
metrics-enabled=true
metrics-host="0.0.0.0"
metrics-port=9545
metrics-categories=["NETWORK", "PEERS", "JVM"]

# Logging
logging="INFO"

# Node permissions
host-allowlist=["*"]

# Data
data-path="/var/lib/besu/data"
node-private-key-file="/etc/besu/keys/bootnode.key"
