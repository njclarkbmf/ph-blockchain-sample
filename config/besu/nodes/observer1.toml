# Observer 1 Configuration - DOH Read Replica
# No block production; syncs and serves read queries.

# Network
p2p-host="0.0.0.0"
p2p-port=30303
max-peers=25
bootnodes=["enode://d7020702ab9a5e3efd1671631cdc98a68e8f612a02222de4003d729a34f8fa20a3e048b2e4f97fa7b7ea71d9cba115fe82e97185355366ec8279e5c085f9f737@172.28.0.2:30303"]

# RPC (internal only)
rpc-http-enabled=true
rpc-http-host="0.0.0.0"
rpc-http-port=8545
rpc-http-api=["ETH", "NET", "WEB3", "DEBUG"]

graphql-http-enabled=true
graphql-http-host="0.0.0.0"
graphql-http-port=8547

# Metrics
metrics-enabled=true
metrics-host="0.0.0.0"
metrics-port=9545
metrics-categories=["NETWORK", "PEERS", "JVM"]

# Observer does not participate in consensus
qbft-block-heuristic-enabled=false

# Node permissions
host-allowlist=["*"]

# Logging
logging="INFO"

# Data
data-path="/var/lib/besu/data"
node-private-key-file="/etc/besu/keys/observer1.key"
