# Validator 3 Configuration - NBI Internal Validator
# No host port mappings; communicates via blockchain network only.

# Network
p2p-host="0.0.0.0"
p2p-port=30303
max-peers=25
bootnodes=["enode://d7020702ab9a5e3efd1671631cdc98a68e8f612a02222de4003d729a34f8fa20a3e048b2e4f97fa7b7ea71d9cba115fe82e97185355366ec8279e5c085f9f737@172.28.0.2:30303"]

# RPC (internal only - not exposed to host)
rpc-http-enabled=true
rpc-http-host="0.0.0.0"
rpc-http-port=8545
rpc-http-api=["ETH", "NET", "WEB3"]

# Metrics
metrics-enabled=true
metrics-host="0.0.0.0"
metrics-port=9545
metrics-categories=["BLOCKCHAIN", "ETHEREUM", "NETWORK", "PEERS", "JVM"]

# Consensus
engine-jwt-disabled=true

# Node permissions
host-allowlist=["*"]

# Logging
logging="INFO"

# Data
data-path="/var/lib/besu/data"
node-private-key-file="/etc/besu/keys/validator3.key"
