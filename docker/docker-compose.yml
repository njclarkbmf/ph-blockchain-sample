# =============================================================================
# Philippine Government Federated Blockchain - Docker Compose
# =============================================================================
#
# DESCRIPTION:
# Complete Docker Compose setup for a permissioned QBFT Besu network
# with 3 validators, 1 observer, 1 bootnode, and monitoring stack.
#
# PREREQUISITES:
# 1. Run scripts/network/setup_qbft.sh to generate node keys
# 2. Ensure config/besu/ directory has genesis, node configs, and keys
#
# PORTS EXPOSED:
# - 8545: JSON-RPC HTTP (validator1 only)
# - 8546: JSON-RPC WebSocket (validator1 only)
# - 8080: Grafana Dashboard (monitoring)
# - 9090: Prometheus (metrics collection)
#
# USAGE:
#   docker compose up -d                    # Start all services
#   docker compose down                     # Stop all services
#   docker compose logs -f validator1       # View validator logs
#   docker compose ps                       # Check service status
# =============================================================================

# =============================================================================
# Networks
# =============================================================================
networks:
  blockchain:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

  monitoring:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  validator1_data:
    name: ph_blockchain_validator1_data
  validator2_data:
    name: ph_blockchain_validator2_data
  validator3_data:
    name: ph_blockchain_validator3_data
  observer1_data:
    name: ph_blockchain_observer1_data
  bootnode_data:
    name: ph_blockchain_bootnode_data

  prometheus_data:
    name: ph_blockchain_prometheus_data
  grafana_data:
    name: ph_blockchain_grafana_data

# =============================================================================
# Logging template (applied to all services)
# =============================================================================
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# =============================================================================
# Services
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Init containers - set correct ownership for Besu data volumes
  # Besu runs as UID 1000 inside the container.
  # ---------------------------------------------------------------------------
  bootnode-init:
    image: alpine:3.19
    container_name: ph-bootnode-init
    volumes:
      - bootnode_data:/var/lib/besu/data
    command: chown -R 1000:1000 /var/lib/besu/data
    networks:
      - blockchain

  validator1-init:
    image: alpine:3.19
    container_name: ph-validator1-init
    volumes:
      - validator1_data:/var/lib/besu/data
    command: chown -R 1000:1000 /var/lib/besu/data
    networks:
      - blockchain

  validator2-init:
    image: alpine:3.19
    container_name: ph-validator2-init
    volumes:
      - validator2_data:/var/lib/besu/data
    command: chown -R 1000:1000 /var/lib/besu/data
    networks:
      - blockchain

  validator3-init:
    image: alpine:3.19
    container_name: ph-validator3-init
    volumes:
      - validator3_data:/var/lib/besu/data
    command: chown -R 1000:1000 /var/lib/besu/data
    networks:
      - blockchain

  observer1-init:
    image: alpine:3.19
    container_name: ph-observer1-init
    volumes:
      - observer1_data:/var/lib/besu/data
    command: chown -R 1000:1000 /var/lib/besu/data
    networks:
      - blockchain

  # ---------------------------------------------------------------------------
  # Bootnode - Network Discovery
  # ---------------------------------------------------------------------------
  bootnode:
    image: hyperledger/besu:24.6.0
    container_name: ph-bootnode
    hostname: bootnode
    depends_on:
      bootnode-init:
        condition: service_completed_successfully
    networks:
      blockchain:
        ipv4_address: 172.28.0.2
    volumes:
      - bootnode_data:/var/lib/besu/data
      - ../config/besu:/etc/besu:ro
    environment:
      - BESU_HOME=/var/lib/besu
      - LOGGING=INFO
    command: >
      --config-file=/etc/besu/nodes/bootnode.toml
      --data-path=/var/lib/besu/data
      --genesis-file=/etc/besu/genesis_qbft.json
      --logging=INFO
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo -e \"GET /metrics HTTP/1.0\\r\\n\\r\\n\" > /dev/tcp/localhost/9545) 2>/dev/null' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Validator 1 - DICT Primary Validator
  # ---------------------------------------------------------------------------
  validator1:
    image: hyperledger/besu:24.6.0
    container_name: ph-validator1
    hostname: validator1
    networks:
      blockchain:
        ipv4_address: 172.28.0.10
    ports:
      - "8545:8545"
      - "8546:8546"
    volumes:
      - validator1_data:/var/lib/besu/data
      - ../config/besu:/etc/besu:ro
    environment:
      - BESU_HOME=/var/lib/besu
      - LOGGING=INFO
    command: >
      --config-file=/etc/besu/nodes/validator1.toml
      --data-path=/var/lib/besu/data
      --genesis-file=/etc/besu/genesis_qbft.json
      --host-allowlist=all
      --logging=INFO
    depends_on:
      validator1-init:
        condition: service_completed_successfully
      bootnode:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo -e \"POST / HTTP/1.0\\r\\nContent-Type: application/json\\r\\nContent-Length: 66\\r\\n\\r\\n{\\\"jsonrpc\\\":\\\"2.0\\\",\\\"method\\\":\\\"eth_blockNumber\\\",\\\"params\\\":[],\\\"id\\\":1}\" > /dev/tcp/localhost/8545) 2>/dev/null' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Validator 2 - BIR Validator
  # NOTE: No host port mappings -- internal-only node. All external traffic
  # should route through validator1.
  # ---------------------------------------------------------------------------
  validator2:
    image: hyperledger/besu:24.6.0
    container_name: ph-validator2
    hostname: validator2
    networks:
      blockchain:
        ipv4_address: 172.28.0.11
    volumes:
      - validator2_data:/var/lib/besu/data
      - ../config/besu:/etc/besu:ro
    environment:
      - BESU_HOME=/var/lib/besu
      - LOGGING=INFO
    command: >
      --config-file=/etc/besu/nodes/validator2.toml
      --data-path=/var/lib/besu/data
      --genesis-file=/etc/besu/genesis_qbft.json
      --host-allowlist=all
      --logging=INFO
    depends_on:
      validator2-init:
        condition: service_completed_successfully
      bootnode:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo -e \"POST / HTTP/1.0\\r\\nContent-Type: application/json\\r\\nContent-Length: 66\\r\\n\\r\\n{\\\"jsonrpc\\\":\\\"2.0\\\",\\\"method\\\":\\\"eth_blockNumber\\\",\\\"params\\\":[],\\\"id\\\":1}\" > /dev/tcp/localhost/8545) 2>/dev/null' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Validator 3 - NBI Validator
  # NOTE: No host port mappings -- internal-only node.
  # ---------------------------------------------------------------------------
  validator3:
    image: hyperledger/besu:24.6.0
    container_name: ph-validator3
    hostname: validator3
    networks:
      blockchain:
        ipv4_address: 172.28.0.12
    volumes:
      - validator3_data:/var/lib/besu/data
      - ../config/besu:/etc/besu:ro
    environment:
      - BESU_HOME=/var/lib/besu
      - LOGGING=INFO
    command: >
      --config-file=/etc/besu/nodes/validator3.toml
      --data-path=/var/lib/besu/data
      --genesis-file=/etc/besu/genesis_qbft.json
      --host-allowlist=all
      --logging=INFO
    depends_on:
      validator3-init:
        condition: service_completed_successfully
      bootnode:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo -e \"POST / HTTP/1.0\\r\\nContent-Type: application/json\\r\\nContent-Length: 66\\r\\n\\r\\n{\\\"jsonrpc\\\":\\\"2.0\\\",\\\"method\\\":\\\"eth_blockNumber\\\",\\\"params\\\":[],\\\"id\\\":1}\" > /dev/tcp/localhost/8545) 2>/dev/null' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Observer 1 - DOH Observer Node
  # NOTE: No host port mappings -- internal-only read replica.
  # ---------------------------------------------------------------------------
  observer1:
    image: hyperledger/besu:24.6.0
    container_name: ph-observer1
    hostname: observer1
    networks:
      blockchain:
        ipv4_address: 172.28.0.20
    volumes:
      - observer1_data:/var/lib/besu/data
      - ../config/besu:/etc/besu:ro
    environment:
      - BESU_HOME=/var/lib/besu
      - LOGGING=INFO
    command: >
      --config-file=/etc/besu/nodes/observer1.toml
      --data-path=/var/lib/besu/data
      --genesis-file=/etc/besu/genesis_qbft.json
      --host-allowlist=all
      --logging=INFO
    depends_on:
      observer1-init:
        condition: service_completed_successfully
      bootnode:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo -e \"POST / HTTP/1.0\\r\\nContent-Type: application/json\\r\\nContent-Length: 66\\r\\n\\r\\n{\\\"jsonrpc\\\":\\\"2.0\\\",\\\"method\\\":\\\"eth_blockNumber\\\",\\\"params\\\":[],\\\"id\\\":1}\" > /dev/tcp/localhost/8545) 2>/dev/null' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ph-prometheus
    hostname: prometheus
    networks:
      - blockchain
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus_rules.yml:/etc/prometheus/rules/prometheus_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Grafana - Monitoring Dashboard
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: ph-grafana
    hostname: grafana
    networks:
      - monitoring
    ports:
      - "8080:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:8080
      - GF_AUTH_ANONYMOUS_ENABLED=false
    depends_on:
      - prometheus
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
